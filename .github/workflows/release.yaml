name: Release

on:
  push:
    branches: [ master ]
    paths:
      - 'PKGBUILD'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set version info
        run: |
          PKGVER=$(grep -E '^pkgver=' PKGBUILD | cut -d= -f2)
          PKGREL=$(grep -E '^pkgrel=' PKGBUILD | cut -d= -f2)
          echo "VER=v${PKGVER}-${PKGREL}" >> "$GITHUB_ENV"
          echo "SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Create release archive
        run: tar --exclude='.git' -czf /tmp/archinstoo-${{ env.VER }}-${{ env.SHA }}.tar.gz -C "$GITHUB_WORKSPACE" .

      - name: Delete existing latest tag
        run: |
          git push origin :refs/tags/latest || true
          gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling latest
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: latest
          name: ${{ env.VER }}
          make_latest: true
          files: /tmp/archinstoo-${{ env.VER }}-${{ env.SHA }}.tar.gz
          body: "Changelog: [here](https://github.com/${{ github.repository }}/blob/master/.github/CHANGELOG.md)"


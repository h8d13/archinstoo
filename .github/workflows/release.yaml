name: release

on:
  push:
    branches: [ master ]
    paths:
      - 'PKGBUILD'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set version info
        run: |
          PKGVER=$(grep -E '^pkgver=' PKGBUILD | cut -d= -f2)
          PKGREL=$(grep -E '^pkgrel=' PKGBUILD | cut -d= -f2)
          echo "VER=v${PKGVER}-${PKGREL}" >> "$GITHUB_ENV"
          echo "SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Create release archive
        run: tar --exclude='.git' -czf /tmp/archinstoo-${{ env.VER }}.tar.gz -C "$GITHUB_WORKSPACE" .

      - name: Delete existing latest tag
        run: |
          git push origin :refs/tags/latest || true
          gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling latest
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: latest
          name: ${{ env.VER }}-${{ env.SHA }}
          make_latest: true
          files: /tmp/archinstoo-${{ env.VER }}.tar.gz
          body: "Changelog: [here](https://github.com/${{ github.repository }}/blob/master/.github/CHANGELOG.md)"


name: release

on:
  push:
    branches: [ master ]
    paths:
      - 'PKGBUILD'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version info
        run: |
          PKGVER=$(grep -E '^pkgver=' PKGBUILD | cut -d= -f2)
          PKGREL=$(grep -E '^pkgrel=' PKGBUILD | cut -d= -f2)
          echo "TAG=v${PKGVER}-${PKGREL}" >> "$GITHUB_ENV"

      - name: Create release archive
        run: tar --exclude='.git' -czf archinstoo-${{ env.TAG }}.tar.gz .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          make_latest: true
          files: archinstoo-${{ env.TAG }}.tar.gz
          body: "Changelog: [here](https://github.com/${{ github.repository }}/blob/master/.github/CHANGELOG.md)"

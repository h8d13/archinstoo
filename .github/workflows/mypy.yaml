on: [ push ]
name: Mypy type checking
jobs:
    mypy:
        runs-on: ubuntu-latest
        container:
            image: archlinux/archlinux:latest
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
            - name: Prepare arch
              run: |
                pacman-key --init
                pacman --noconfirm -Sy archlinux-keyring
                pacman --noconfirm -Syyu
                pacman --noconfirm -Sy python-pip python-pyparted pkgconfig gcc
            - run: pip install --break-system-packages --upgrade pip
            # this will install the exact version of mypy that is in the pyproject.toml file
            - name: Install archinstoo dependencies
              run: pip install --break-system-packages ./archinstoo[dev]
            - run: python --version
            - run: mypy --version
            - name: run mypy
              run: mypy --config-file archinstoo/pyproject.toml archinstoo/archinstoo

{#-
  Override: keep default repo (GitHub) source link, add GitLab mirror beside it.
-#}
<a href="{{ config.repo_url }}" title="{{ lang.t('source') }}" class="md-source" data-md-component="source">
  <div class="md-source__icon md-icon">
    {% set icon = config.theme.icon.repo or "fontawesome/brands/git-alt" %}
    {% include ".icons/" ~ icon ~ ".svg" %}
  </div>
  <div class="md-source__repository">
    {{ config.repo_name }}
  </div>
</a>
<a href="https://gitlab.archlinux.org/h8d13/archinstoo/" title="GitLab mirror" class="md-source">
  <div class="md-source__icon md-icon">
    {% include ".icons/fontawesome/brands/gitlab.svg" %}
  </div>
  <div class="md-source__repository">
    GitLab mirror
  </div>
</a>

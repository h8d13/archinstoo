site_name: archinstoo
site_description: A fork of archinstall
site_url: https://h8d13.github.io/archinstoo/
copyright: archinstoo docs
repo_url: https://github.com/h8d13/archinstoo
repo_name: h8d13/archinstoo

# Docs live alongside GitHub metadata in .github/; keep non-doc files out of the build.
docs_dir: .github
site_dir: site
exclude_docs: |
  workflows/
  ISSUE_TEMPLATE/
  CODEOWNERS
  docs-requirements.txt

extra:
  generator: false
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.archlinux.org/h8d13/archinstoo/
      name: GitLab mirror

# search is implicit by default, but listing plugins disables it - so re-add it.
# callouts converts GitHub/Obsidian '> [!TIP]' alerts to Material admonitions.
plugins:
  - search
  - callouts

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - content.code.copy

markdown_extensions:
  - md_in_html
  - admonition
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started:
      - Newcomers: NEWB_CORNER.md
      - JSON file: CONFIG.md
      - Config schema: SCHEMA.md
  - Cases:
      - Headless install: HEADLESS.md
      - Multi-boot: MULTI_BOOT.md
      - nVIDIA: NVIDIA.md
      - CachyOS kernels: CACHY_KERNELS.md
      - ARM (Arch ALARM): ARM_SUPPORT.md
      - Build your own ISOs: BUILD_ISOS.md
      - AUR / out-of-tree: OUT_OF_TREE.md
      - Dependency chains: DEP_CHAINS.md
  - Project:
      - Contributing: CONTRIBUTING.md
      - Security: SECURITY.md
      - Philosophy: PHILOSOPHY.md
      - Past work: PAST_CONTRIBS.md
      - Troubleshooting: TROUBLESHOOT.md
  - What's new: CHANGELOG.md

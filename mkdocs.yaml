site_name: archinstoo
site_description: A fork of archinstall
site_url: https://h8d13.github.io/archinstoo/
copyright: archinstoo docs © 2026 - h8d13
repo_url: https://github.com/h8d13/archinstoo
repo_name: h8d13/archinstoo
# per-page link to same file on GitHub (blob = read view, not editor)
edit_uri: blob/master/.github/
# symlinked docs resolve to their real target, see .github/hooks.py
hooks:
  - .github/hooks.py

# Docs live alongside GitHub metadata in .github/; keep non-doc files out of the build.
docs_dir: .github
site_dir: site
exclude_docs: |
  workflows/
  ISSUE_TEMPLATE/
  overrides/
  CODEOWNERS
  docs-requirements.txt
  hooks.py

extra:
  generator: false
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.archlinux.org/h8d13/archinstoo/
      name: GitLab mirror

# search is implicit by default, but listing plugins disables it - so re-add it.
# callouts converts GitHub/Obsidian '> [!TIP]' alerts to Material admonitions.
plugins:
  - search
  - callouts

theme:
  name: material
  custom_dir: .github/overrides
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
  icon:
    edit: fontawesome/brands/github

markdown_extensions:
  - md_in_html
  - admonition
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started:
      - Newcomers: NEWB_CORNER.md
      - JSON file: CONFIG.md
      - Config schema: SCHEMA.md
  - Cases:
      - Headless / servers: HEADLESS.md
      - Multi-boot: MULTI_BOOT.md
      - nVIDIA new / old: NVIDIA.md
      - CachyOS kernels: CACHY_KERNELS.md
      - AUR / out-of-tree: OUT_OF_TREE.md
      - Dependency chains: DEP_CHAINS.md
      - ARM64 / SBCs: ARM_SUPPORT.md
  - Project:
      - Contributing: CONTRIBUTING.md
      - API Reference: API_REF.md
      - Build ISOs: BUILD_ISOS.md
      - Strucs: STRUCTURE.md
      - Security: SECURITY.md
      - Philosophy: PHILOSOPHY.md
      - Past work: PAST_CONTRIBS.md
      - Troubleshooting: TROUBLESHOOT.md
      - Other Linux: DISTROS.md
  - What's new: CHANGELOG.md
